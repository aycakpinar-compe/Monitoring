services:
  flask-app:
    build:
      context: .
    container_name: flask_app
    ports:
      - "8000:8000"  # This maps the port correctly
    environment:
      - FLASK_ENV=development
    networks:
      - backend
    
  nginx:
    image: nginx:alpine
    container_name: nginx_server
    volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf
  # Mount configuration properly
    ports:
      - "80:80"
    depends_on:
      - flask-app  # Name must match the service name
    networks:
      - backend

networks:
  backend:
    driver: bridge