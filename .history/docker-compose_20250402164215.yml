services:
  flask:
    build:
      context: .
    container_name: flask_app
    expose:
      - "8000"  # Flask's internal port, no need for port mapping
    environment:
      - FLASK_ENV=development
    networks:
      - backend 
    depends_on:
      - mysql # Ensure flask service connects to 'backend'

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf  # Nginx configuration file
    ports:
      - "80:80"
    depends_on:
      - flask
    networks:
      - backend  # Nginx also connects to the same 'backend' network

 
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Bitirme.proj.24  # Güvenli bir şifre belirleyin
      MYSQL_DATABASE: stajdb  # Veritabanı adını ayarlayın
      MYSQL_USER: root  # Kullanıcı adını ayarlayın
      MYSQL_PASSWORD: password  # Güvenli bir şifre belirleyin
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
networks:
  backend:
    driver: bridge
volumes:
  mysql_data: