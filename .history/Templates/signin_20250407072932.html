<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{url_for('static',filename='sign.css')}}">
    <script src="{{url_for('static',filename='index.js')}}" defer></script>
</head>
<body>
    <h2>WELCOME TO MY INTERNSHIP PROJECT</h2>
    <h5>Dont you have an account?</h5>
    
    <button type="button" onclick="window.location.href='http://127.0.0.1:5000/signup'">Sign up</button>
    
    <form method="POST" onsubmit="signin(event)">
        <label for="useremail">Email:</label>
        <input type="email" id="useremail" name="useremail" required>
        
        <label for="userpass">Password:</label>
        <input type="password" id="userpass" name="password" required>
        
        <button type="submit">Sign in</button>
    </form>
</body>
</html>
