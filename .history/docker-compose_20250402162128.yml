services:
  flask:
    build:
      context: .
    container_name: flask_app
    expose:
      - "8000"  # Flask's internal port, no need for port mapping
    environment:
      - FLASK_ENV=development
    networks:
      - backend  # Ensure flask service connects to 'backend'

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf  # Nginx configuration file
    ports:
      - "80:80"
    depends_on:
      - flask
    networks:
      - backend  # Nginx also connects to the same 'backend' network

networks:
  backend:
    driver: bridge
